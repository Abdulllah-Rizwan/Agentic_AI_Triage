version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16   # pg16 with pgvector extension pre-installed
    container_name: agentic_ai_triage
    environment:
      POSTGRES_USER: agentic_ai_triage
      POSTGRES_PASSWORD: agentic_ai_triage_dev_pass
      POSTGRES_DB: agentic_ai_triage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/init_db.sql:/docker-entrypoint-initdb.d/init.sql  # enables pgvector
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic_ai_triage"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentic_ai_triage_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
